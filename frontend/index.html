<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>TODO APP</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="./css/styles.css">
    </head>
    <!--
    min-vh-100 is a CSS utility class that
    sets an element's minimum height to 100%
    of the viewport height (100vh).
    -->
    <body class="min-vh-100 bg-dark d-flex justify-content-center">
        <div class="container my-5">
            <!-- CREATE A TASK FORM-->
             <h2 class="mb-3 text-white">Create Task</h2>
             <form id="newTaskForm" class="bg-body-secondary p-3 rounded">
                <div class="d-flex gap-3 flex-wrap">
                    <div class="form-group flex-grow-1">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" id="title" name="title"
                         class="form-control" placeholder="Mow the lawn" required>
                    </div>
                    <div class="form-group">
                        <label for="dueDate" class="form-label">Due Date</label>
                        <input type="date" name="dueDate" id="dueDate" class="form-control" required>
                    </div>
                    <div class="align-self-end">
                        <button type="submit" class="btn btn-primary">Create Task</button>
                    </div>
                </div>
             </form>
        </div>
    </body>
</html>
